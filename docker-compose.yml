services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL:-http://localhost:5000}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
        VITE_REQUEST_TIMEOUT_MS: ${VITE_REQUEST_TIMEOUT_MS:-10000}
        VITE_ENABLE_MOCKS: ${VITE_ENABLE_MOCKS:-false}
    container_name: skills-educacional-prod
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.production
    volumes:
      # Volumes para certificados SSL (descomente e ajuste os caminhos conforme necessário)
      # - ./ssl:/etc/nginx/ssl:ro
      # Volume para logs
      - ./logs:/var/log/nginx
    restart: unless-stopped
    networks:
      - skills-network
    environment:
      - NODE_ENV=production
      - VITE_AUTH_BASE_URL=${VITE_AUTH_BASE_URL:-http://localhost:5000}
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5000/api/v1}
      - VITE_REQUEST_TIMEOUT_MS=${VITE_REQUEST_TIMEOUT_MS:-10000}
      - VITE_ENABLE_MOCKS=${VITE_ENABLE_MOCKS:-false}

networks:
  skills-network:
    driver: bridge
