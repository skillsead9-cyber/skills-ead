# Configuração do Nginx para SKILLS Educacional
# Otimizada para Single Page Application (SPA) Vue.js

# Redirecionamento HTTP (porta 80) para HTTPS (porta 443)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redireciona todo o tráfego HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

# Servidor HTTPS (porta 443)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # Configuração SSL/TLS
    # IMPORTANTE: Substitua os caminhos pelos certificados reais em produção
    ssl_certificate /etc/nginx/ssl/skills.crt;
    ssl_certificate_key /etc/nginx/ssl/skills.key;

    # Configurações SSL recomendadas
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de segurança
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Raiz do servidor web
    root /usr/share/nginx/html;
    index index.html;

    # Logs
    access_log /var/log/nginx/skills_access.log;
    error_log /var/log/nginx/skills_error.log;

    # Compressão Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Cache de assets estáticos
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Configuração para SPA - fallback para index.html
    # Todas as rotas não encontradas redirecionam para index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Headers adicionais
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Bloqueia acesso a arquivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint (opcional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
